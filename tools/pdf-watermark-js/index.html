<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Watermark</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="app-title">
        <form class="controls" id="watermark-form" autocomplete="off">
          <header class="toolbar">
            <div>
              <h1 id="app-title">PDF Watermark <span class="app-version" id="app-version"></span></h1>
              <p id="file-summary">No file selected</p>
            </div>
            <button class="primary-action" id="download-button" type="submit">
              Download PDF
            </button>
          </header>

          <label class="file-target" id="drop-zone">
            <input
              id="pdf-file"
              type="file"
              accept="application/pdf,.pdf,.pptx,application/vnd.openxmlformats-officedocument.presentationml.presentation,.docx,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            />
            <span class="file-target-title">Choose PDF, PPTX, or DOCX</span>
            <span class="file-target-meta" id="drop-label">or drop it here</span>
          </label>

          <div class="field">
            <label for="watermark-text">Watermark text</label>
            <input id="watermark-text" type="text" value="CONFIDENTIAL" required />
          </div>

          <div class="settings-grid">
            <div class="field">
              <label for="font-size">Font size</label>
              <input id="font-size" type="number" value="36" min="6" max="200" />
            </div>
            <div class="field">
              <label for="opacity">Opacity</label>
              <input id="opacity" type="number" value="0.1" min="0" max="1" step="0.05" />
            </div>
            <div class="field">
              <label for="rotation">Rotation</label>
              <input id="rotation" type="number" value="45" min="-180" max="180" />
            </div>
          </div>

          <div class="settings-grid color-grid">
            <div class="field">
              <label for="watermark-color">Color</label>
              <div class="color-control">
                <input id="watermark-color" type="color" value="#333333" />
                <span id="color-value">#333333</span>
              </div>
            </div>
            <div class="field switch-field">
              <label for="repeat-watermark">Repeat</label>
              <input id="repeat-watermark" type="checkbox" checked />
            </div>
          </div>

          <div class="settings-grid" id="spacing-controls">
            <div class="field">
              <label for="spacing-x">Horizontal spacing</label>
              <input id="spacing-x" type="number" value="250" min="10" />
            </div>
            <div class="field">
              <label for="spacing-y">Vertical spacing</label>
              <input id="spacing-y" type="number" value="200" min="10" />
            </div>
          </div>

          <section class="security-panel" aria-labelledby="security-title">
            <div class="section-heading">
              <label class="checkbox-label" for="protect-permissions">
                <input id="protect-permissions" type="checkbox" checked />
                <span id="security-title">Protect permissions</span>
              </label>
            </div>

            <div class="password-row">
              <div class="field">
                <label for="permission-password">Permissions password</label>
                <input id="permission-password" type="text" autocomplete="off" />
              </div>
              <button class="secondary-action" id="generate-password" type="button">Generate</button>
            </div>

            <div class="permission-grid">
              <label class="checkbox-label" for="allow-print">
                <input id="allow-print" type="checkbox" />
                <span>Allow print</span>
              </label>
              <label class="checkbox-label" for="allow-copy">
                <input id="allow-copy" type="checkbox" />
                <span>Allow copy</span>
              </label>
              <label class="checkbox-label" for="allow-annotate">
                <input id="allow-annotate" type="checkbox" />
                <span>Allow annotate/forms</span>
              </label>
            </div>
          </section>

          <p class="status-line" id="status-line" role="status" aria-live="polite"></p>
        </form>

        <aside class="preview-panel" aria-label="Preview">
          <canvas id="preview-canvas" width="420" height="560"></canvas>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
